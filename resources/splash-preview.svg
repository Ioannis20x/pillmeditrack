<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="512" height="512">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4A5E4C" flood-opacity="0.2"/>
    </filter>
    <clipPath id="clip-left">
      <rect x="0" y="0" width="512" height="1024"/>
    </clipPath>
    <clipPath id="clip-right">
      <rect x="512" y="0" width="512" height="1024"/>
    </clipPath>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF6F1"/>
      <stop offset="100%" stop-color="#F0EBE3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg-grad)"/>

  <!-- Pill (smaller, centered higher) -->
  <g filter="url(#shadow)">
    <rect x="312" y="380" width="400" height="174" rx="87"
          fill="#7A8E7C" clip-path="url(#clip-left)"/>
    <rect x="312" y="380" width="400" height="174" rx="87"
          fill="#B2C9B0" clip-path="url(#clip-right)"/>
  </g>
  <rect x="510" y="380" width="5" height="174" fill="rgba(255,255,255,0.55)"/>
  <ellipse cx="415" cy="426" rx="54" ry="20" fill="rgba(255,255,255,0.18)"/>
  <ellipse cx="608" cy="426" rx="44" ry="17" fill="rgba(255,255,255,0.22)"/>

  <!-- App name -->
  <text
    x="512" y="626"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="88"
    font-weight="400"
    fill="#3D4D3E"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-1">MediTrack</text>

  <!-- Tagline -->
  <text
    x="512" y="706"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="30"
    font-weight="300"
    fill="#8A9B8C"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="3">DEINE MEDIKAMENTE</text>
</svg>
